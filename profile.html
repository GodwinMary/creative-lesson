<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | ARTS AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D4380D',
                        secondary: '#FAAD14',
                        accent: '#389E0D',
                        dark: '#1A1A2E',
                        cream: '#FFF8E7',
                        terracotta: '#C4501A',
                        gold: '#E8A317',
                        forest: '#2D6A1E',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body class="bg-cream font-['Nunito'] text-dark">
    <!-- Navigation -->
    <nav id="navbar" class="bg-dark text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <span class="text-3xl">🎨</span>
                <span class="font-['Fredoka_One'] text-xl text-secondary">ARTS AI</span>
            </a>
            <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
                <a href="index.html" class="hover:text-secondary transition">Home</a>
                <a href="profile.html" class="text-secondary">Profile</a>
                <a href="dashboard.html" class="hover:text-secondary transition">Dashboard</a>
                <a href="quiz.html" class="hover:text-secondary transition">Quiz</a>
                <button onclick="logout()" class="bg-primary px-4 py-2 rounded-full hover:bg-terracotta transition">Logout</button>
            </div>
            <button id="mobileMenuBtn" class="md:hidden text-2xl" onclick="toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-16">
        <!-- Profile Section -->
        <section id="profileSection" class="bg-white rounded-2xl shadow-lg p-8 mb-8">
            <h1 class="font-['Fredoka_One'] text-3xl text-dark mb-8">Student Profile</h1>
            
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Profile Info -->
                <div>
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                        <input type="text" id="fullName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Enter your full name">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Class Level</label>
                        <select id="classLevel" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                            <option value="">Select Class</option>
                            <option value="jss1">JSS 1</option>
                            <option value="jss2">JSS 2</option>
                            <option value="jss3">JSS 3</option>
                        </select>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">School</label>
                        <input type="text" id="school" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Enter your school name">
                    </div>
                </div>
                
                <!-- Progress Overview -->
                <div>
                    <h3 class="font-bold text-xl mb-4">Learning Progress</h3>
                    <div class="space-y-4">
                        <div class="bg-gray-50 rounded-lg p-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-semibold">Overall Progress</span>
                                <span id="overallProgress" class="text-primary font-bold">0%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div id="overallProgressBar" class="bg-primary h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div class="bg-gray-50 rounded-lg p-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-semibold">Lessons Completed</span>
                                <span id="lessonsCompleted" class="text-accent font-bold">0/0</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div id="lessonsProgressBar" class="bg-accent h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div class="bg-gray-50 rounded-lg p-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-semibold">Quiz Average</span>
                                <span id="quizAverage" class="text-secondary font-bold">0%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div id="quizProgressBar" class="bg-secondary h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-4 mt-8">
                <button onclick="saveProfile()" class="bg-primary text-white px-6 py-3 rounded-full font-bold hover:bg-terracotta transition">
                    Save Profile
                </button>
                <button onclick="goToDashboard()" class="bg-accent text-white px-6 py-3 rounded-full font-bold hover:bg-green-600 transition">
                    Go to Dashboard
                </button>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
